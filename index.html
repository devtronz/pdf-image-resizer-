<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Image Resizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }
    .glass-dark {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .drop-zone {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .drop-zone.dragover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.03);
      border-color: rgba(255,255,255,0.6);
    }
    input[type="number"] {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body class="text-white">
  <div class="max-w-6xl mx-auto p-4 md:p-8">
    <!-- Header -->
    <header class="flex justify-between items-center mb-8 md:mb-12">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-file-pdf text-4xl"></i>
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight">PDF Image Resizer</h1>
      </div>
      <button id="theme-toggle" class="glass px-5 py-3 rounded-3xl flex items-center gap-2 hover:scale-105 transition-all">
        <i class="fa-solid fa-moon"></i>
      </button>
    </header>

    <div class="glass dark:glass-dark rounded-3xl p-6 md:p-10 lg:p-12">
      <!-- Drag & Drop -->
      <div id="drop-zone" class="drop-zone glass dark:glass-dark border-2 border-dashed border-white/40 rounded-3xl p-10 md:p-16 text-center cursor-pointer">
        <i class="fa-solid fa-cloud-arrow-up text-6xl md:text-7xl mb-6 opacity-75"></i>
        <p class="text-xl md:text-2xl font-medium mb-2">Drop PDF or Images here</p>
        <p class="text-white/70 mb-6">or click to browse</p>
        <button onclick="document.getElementById('file-input').click()" 
                class="bg-white/20 hover:bg-white/30 px-8 py-4 rounded-2xl font-semibold transition-all active:scale-95">
          Browse Files
        </button>
        <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.jpg,.jpeg,.png,.webp">
      </div>

      <!-- Controls -->
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10">
        
        <!-- Scale -->
        <div class="glass dark:glass-dark rounded-3xl p-6">
          <h3 class="font-semibold mb-4 flex items-center gap-2">
            <i class="fa-solid fa-arrows-up-down"></i> Scale
          </h3>
          <input type="range" id="scale" min="10" max="300" value="100" 
                 class="w-full accent-white mb-3">
          <div class="flex justify-between text-sm">
            <span>10%</span>
            <span id="scale-value" class="font-mono font-bold">100%</span>
            <span>300%</span>
          </div>
        </div>

        <!-- Aspect Ratio -->
        <div class="glass dark:glass-dark rounded-3xl p-6">
          <h3 class="font-semibold mb-4 flex items-center gap-2">
            <i class="fa-solid fa-square"></i> Aspect Ratio
          </h3>
          
          <div class="flex items-center gap-3 mb-4">
            <button onclick="toggleAspectLock()" id="lock-btn"
                    class="flex-1 py-3 rounded-2xl flex items-center justify-center gap-2 transition-all">
              <i id="lock-icon" class="fa-solid fa-lock"></i>
              <span id="lock-text">Lock</span>
            </button>
          </div>

          <div class="grid grid-cols-3 gap-2 text-sm mb-5">
            <button onclick="setPresetRatio(1,1)" class="py-2 rounded-xl hover:bg-white/20 transition">1:1</button>
            <button onclick="setPresetRatio(16,9)" class="py-2 rounded-xl hover:bg-white/20 transition">16:9</button>
            <button onclick="setPresetRatio(4,3)" class="py-2 rounded-xl hover:bg-white/20 transition">4:3</button>
          </div>

          <div class="flex gap-4 items-center">
            <div class="flex-1">
              <label class="text-xs opacity-70">Width</label>
              <input type="number" id="width" value="1200" 
                     class="w-full mt-1 px-4 py-3 rounded-2xl text-center font-mono focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
            <div class="text-2xl mt-6">×</div>
            <div class="flex-1">
              <label class="text-xs opacity-70">Height</label>
              <input type="number" id="height" value="800" 
                     class="w-full mt-1 px-4 py-3 rounded-2xl text-center font-mono focus:outline-none focus:ring-2 focus:ring-white/50">
            </div>
          </div>
        </div>

        <!-- Presets -->
        <div class="glass dark:glass-dark rounded-3xl p-6">
          <h3 class="font-semibold mb-4">Quick Presets</h3>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <button onclick="applyPreset('a4')" class="py-3 rounded-2xl hover:bg-white/20 transition">A4 Document</button>
            <button onclick="applyPreset('ig')" class="py-3 rounded-2xl hover:bg-white/20 transition">Instagram Post</button>
            <button onclick="applyPreset('story')" class="py-3 rounded-2xl hover:bg-white/20 transition">Story / Reel</button>
            <button onclick="applyPreset('linkedin')" class="py-3 rounded-2xl hover:bg-white/20 transition">LinkedIn</button>
          </div>
        </div>
      </div>

      <!-- Preview -->
      <div class="mt-10 grid md:grid-cols-2 gap-8">
        <div class="glass dark:glass-dark rounded-3xl p-6">
          <p class="text-sm opacity-70 mb-4 font-medium">Before</p>
          <div id="preview-before" class="bg-black/30 aspect-video rounded-2xl flex items-center justify-center text-white/40 border border-white/10">
            Preview will appear here
          </div>
        </div>
        <div class="glass dark:glass-dark rounded-3xl p-6">
          <p class="text-sm opacity-70 mb-4 font-medium">After</p>
          <div id="preview-after" class="bg-black/30 aspect-video rounded-2xl flex items-center justify-center text-white/40 border border-white/10">
            Resized preview
          </div>
        </div>
      </div>

      <button id="process-btn" 
              class="mt-12 w-full bg-white text-purple-700 font-bold py-6 rounded-3xl text-lg hover:scale-[1.02] active:scale-95 transition-all shadow-2xl flex items-center justify-center gap-3">
        <i class="fa-solid fa-magic"></i>
        Resize & Download
      </button>
    </div>

    <p class="text-center text-white/50 mt-8 text-sm">Client-side processing • No data leaves your device</p>
  </div>

  <script>
    // Tailwind script already included via CDN

    let aspectLocked = true;
    let currentRatio = 1200 / 800;

    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const scaleSlider = document.getElementById('scale');
    const scaleValue = document.getElementById('scale-value');

    // Sync dimensions when locked
    function syncDimensions() {
      if (!aspectLocked) return;
      const w = parseFloat(widthInput.value);
      heightInput.value = Math.round(w / currentRatio);
    }

    widthInput.addEventListener('input', syncDimensions);
    heightInput.addEventListener('input', () => {
      if (aspectLocked) {
        const h = parseFloat(heightInput.value);
        widthInput.value = Math.round(h * currentRatio);
      }
    });

    // Scale slider
    scaleSlider.addEventListener('input', () => {
      scaleValue.textContent = scaleSlider.value + '%';
    });

    function toggleAspectLock() {
      aspectLocked = !aspectLocked;
      const btn = document.getElementById('lock-btn');
      const icon = document.getElementById('lock-icon');
      const text = document.getElementById('lock-text');
      
      if (aspectLocked) {
        icon.classList.replace('fa-lock-open', 'fa-lock');
        text.textContent = 'Locked';
        btn.classList.add('bg-white/20');
        currentRatio = parseFloat(widthInput.value) / parseFloat(heightInput.value);
      } else {
        icon.classList.replace('fa-lock', 'fa-lock-open');
        text.textContent = 'Unlocked';
        btn.classList.remove('bg-white/20');
      }
    }

    function setPresetRatio(w, h) {
      currentRatio = w / h;
      widthInput.value = w * 10;   // scaled example
      heightInput.value = h * 10;
      if (aspectLocked) syncDimensions();
    }

    function applyPreset(type) {
      if (type === 'a4') setPresetRatio(210, 297);     // mm example
      if (type === 'ig') setPresetRatio(1080, 1080);
      if (type === 'story') setPresetRatio(1080, 1920);
      if (type === 'linkedin') setPresetRatio(1200, 627);
    }

    // Drag & Drop + Theme (same as before)
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('click', () => document.getElementById('file-input').click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      console.log('Files ready for processing');
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });

    // Initial lock state
    toggleAspectLock();
  </script>
</body>
</html>
